<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>With Warm Regards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #111; --mid: #999; --light: #e2e2e2; --bg: #fff; --sans: 'DM Sans', Arial, sans-serif; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.55; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--bg); display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2.5rem; border-bottom: 1px solid transparent; transition: border-color 0.3s; }
    nav.scrolled { border-color: var(--light); }
    .nav-title { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.045em; text-transform: uppercase; color: var(--ink); cursor: pointer; user-select: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.75rem; letter-spacing: 0.035em; text-transform: uppercase; color: var(--mid); text-decoration: none; transition: color 0.15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--ink); }
    .view { display: none; animation: fadeIn 0.3s ease both; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    #view-grid { padding: 5.5rem 2.5rem 6rem; }
    .grid-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2.5rem; padding-top: 1.5rem; }
    .grid-label { font-size: 0.68rem; letter-spacing: 0.049em; text-transform: uppercase; color: var(--mid); }
    .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .tile { cursor: pointer; background: #f0efed; overflow: hidden; }
    .tile-img { aspect-ratio: 3/4; width: 100%; overflow: hidden; background: #ebebeb; }
    .tile-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s ease, opacity 0.3s; }
    .tile:hover .tile-img img { transform: scale(1.04); opacity: 0.88; }
    .tile-no-img { width: 100%; height: 100%; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; letter-spacing: 0.035em; text-transform: uppercase; color: #ccc; }
    .tile-info { padding: 0.9rem 1rem 1.2rem; }
    .tile-date { font-size: 0.6rem; letter-spacing: 0.025em; color: var(--mid); text-transform: uppercase; margin-bottom: 0.3rem; }
    .tile-title { font-size: 0.9rem; font-weight: 400; line-height: 1.3; color: var(--ink); }
    .tile-lede { font-size: 0.76rem; color: var(--mid); font-style: italic; margin-top: 0.25rem; line-height: 1.45; }
    .empty-state { grid-column: 1/-1; padding: 6rem 0; text-align: center; font-size: 0.88rem; color: var(--mid); font-style: italic; }
    #view-post { padding: 8rem 2.5rem 9rem; max-width: 640px; margin: 0 auto; }
    .back-btn { font-size: 0.68rem; letter-spacing: 0.035em; text-transform: uppercase; color: var(--mid); cursor: pointer; background: none; border: none; margin-bottom: 3.5rem; display: block; transition: color 0.15s; padding: 0; font-family: var(--sans); }
    .back-btn:hover { color: var(--ink); }
    .sv-date { font-size: 0.68rem; color: var(--mid); letter-spacing: 0.021em; margin-bottom: 0.8rem; }
    .sv-title { font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 400; line-height: 1.2; margin-bottom: 1.5rem; }
    .sv-thumbnail { width: 100%; max-height: 440px; object-fit: cover; display: block; margin-bottom: 2rem; }
    .sv-lede { font-size: 0.97rem; color: var(--mid); font-style: italic; line-height: 1.55; padding-bottom: 2rem; border-bottom: 1px solid var(--light); margin-bottom: 2rem; }
    .sv-body { font-size: 0.95rem; line-height: 1.6; color: #222; }
    .sv-body p { margin-bottom: 1.4rem; }
    .sv-body h2 { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.045em; text-transform: uppercase; color: var(--mid); margin: 2.5rem 0 0.9rem; }
    .sv-body h3 { font-size: 1rem; font-weight: 500; margin: 2rem 0 0.7rem; }
    .sv-body blockquote { border-left: 2px solid var(--light); padding-left: 1.4rem; margin: 2rem 0; font-style: italic; color: var(--mid); }
    .sv-body img { max-width: 100%; height: auto; display: block; margin: 2rem auto; }
    .sv-body figure { margin: 2rem 0; }
    .sv-body figcaption { font-size: 0.68rem; letter-spacing: 0.025em; text-transform: uppercase; color: var(--mid); margin-top: 0.6rem; text-align: center; }
    .sv-body ul, .sv-body ol { padding-left: 1.5rem; margin-bottom: 1.4rem; }
    .sv-body li { margin-bottom: 0.3rem; }
    .img-full { width: 100%; }
    .img-left { float: left; width: 48%; margin: 0.5rem 2rem 1rem 0; }
    .img-right { float: right; width: 48%; margin: 0.5rem 0 1rem 2rem; }
    .img-center { display: block; margin: 2rem auto; max-width: 80%; }
    .clearfix::after { content: ''; display: table; clear: both; }
    #view-about { padding: 8rem 2.5rem 8rem; max-width: 600px; margin: 0 auto; }
    .about-label { font-size: 0.68rem; letter-spacing: 0.049em; text-transform: uppercase; color: var(--mid); margin-bottom: 2.5rem; }
    #view-about h2 { font-size: clamp(1.3rem, 3vw, 1.9rem); font-weight: 400; line-height: 1.35; margin-bottom: 2rem; }
    .about-body p { font-size: 0.95rem; line-height: 1.6; color: #222; margin-bottom: 1.3rem; }
    .about-body a { color: var(--ink); text-decoration: underline; text-underline-offset: 2px; }
    .about-body a:hover { color: var(--mid); }
    hr.divider { border: none; border-top: 1px solid var(--light); margin: 2.5rem 0; }
    .about-meta { display: grid; grid-template-columns: 90px 1fr; gap: 0.5rem 2rem; font-size: 0.88rem; }
    .about-meta .lbl { font-size: 0.64rem; letter-spacing: 0.035em; text-transform: uppercase; color: var(--mid); padding-top: 0.1rem; }
    footer { text-align: center; padding: 4rem 2.5rem; font-size: 0.62rem; letter-spacing: 0.035em; text-transform: uppercase; color: var(--light); }
    @media (max-width: 700px) {
      nav { padding: 1.2rem 1.4rem; }
      #view-grid { padding: 5rem 1.4rem 5rem; }
      .post-grid { grid-template-columns: repeat(2, 1fr); }
      #view-post, #view-about { padding-left: 1.4rem; padding-right: 1.4rem; }
      .img-left, .img-right { float: none; width: 100%; margin: 1.5rem 0; }
    }
    @media (max-width: 400px) { .post-grid { grid-template-columns: 1fr; } }
  </style>
</head>

<script>
  const POSTS = [{"id":"mlxnjktb9mvt","title":"January flew by","lede":"","body":"<p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">How has four weeks already gone by?</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">It seemed like only yesterday that we first arrived back from our long trip to Europe. How have you been? How have we been?</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">Well, we’ve both been working like horses. For me, I had to power through two straight weeks of working in the hospital, including weekends and four overnight stays. Day in and out, reviewing my own patients and covering for colleagues who also had their own fair share of evening calls.</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">I felt as though I’ve finally gotten a hang of life as a houseman in internal medicine. The day-to-day work is like a breeze now (for as long as the patient number is manageable), and I’ve become more confident in presenting my patients, suggesting my own management plans, and making decisions for them. I guess that’s learning on the job, where our day-to-day encounters get charged to experience. Even night calls, in which I would have to remain in the hospital from 5PM until 8AM the following day, and worse, make independent calls that may often end catastrophically, have become more manageable.&nbsp;<em>Welp, it was relief that I’m still growing.</em></p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">Best of all, I was lucky to be surrounded by great colleagues and old classmates who made the day-to-day experience much more endurable. Hard work is so much more enjoyable when there are people around you to push through with.</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">Meanwhile, Soph has left me behind in Singapore for almost two weeks to go on a business trip to Manila. It was quite a relief to me that she managed to spend some time with both our families as I haven’t gone home in quite a while. She was quite busy too, juggling between her 1302491 meetings with clients and being a fellow human being to her dear friends and family who we rarely see. She also attended a wedding, and rocked a yellow dress effortlessly!</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">We’re ending January on a bright note — we both a free weekend that we haven’t been able to spend freely in a long while. Guess we’re getting Veganburg tomorrow!</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">Warm regards,</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">Martin and Sophie</p>","thumbnail":"https://martinqui.github.io/blog/admin","photos":[],"published":true,"publishDate":"2026-01-30","createdAt":1771758967583},{"id":"mlxm61tl9zny","title":"How we spent Christmas and New Year’s","lede":"","body":"<p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">We're finally back in Singapore after a two week trip in Europe. Sophie and I decided spend the holidays in Copenhagen, Belgium and Amsterdam as we have always wanted to visit these places for the food and the sights. Having just started work as a junior doctor, my annual leaves were limited, and since Sophie had been unable to use up her leaves for the year, we both decided to take the chance to make the big trip,&nbsp;<em>while we could.</em></p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">Europe isn’t a popular tourist destination in the winter. With daylight being limited, establishments observing holiday hours and not-so-friendly weather conditions — most itineraries to Europe seemed mainly to be trips home to spend the holidays with family and friends. But for us, visiting during this time seemed to be a great opportunity to travel more slowly and experience Christmas markets.</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">And so we did. We planned our itinerary intentionally, starting out pre-Christmas in Copenhagen as we read that the city tends to quiet down from the 24th onwards. We spent most of our days in Copenhagen hunting down bakeries and restaurants started by Noma alumni; among those notable include:</p><ul style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\"><li>Juno by Emil Glaser (ex-Noma pastry chef)</li><li>Hart Bageri by Richard Hart (ex-Noma pastry chef)</li><li>Andersen and Maillard by Milton Abel (ex-Noma pastry chefs) and barista Hans Kristian Andersen</li><li>Baest by Christian Puglisi (ex-Noma chef)</li><li>Hija de Sanchez by Rosio (ex-Noma pastry chef).</li></ul><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">Safe to say that our hearts were filled by the time we left, with much more to desire.</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">We left early on Christmas Eve for Belgium. It was sort of a last minute decision, as we wanted to add in one more destination before ending in Amsterdam. It was close enough, and the flight cost was reasonable.</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">To be honest, we were slightly anxious about making this trip. We heard that our main destination Brussels has become quite unsafe (having sustained bombings back in 2016, and also being a site for gang violence). We had our guards up upon arriving to Brussels.</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">While we thankfully were spared from any such mishaps while in Brussels, we felt that there wasn’t much to do in the end. We walked throughout the city on foot and tried Belgian waffles, chocolates, and their popular Moules Frites and Frites Atelier. We felt that our experience with the food was the highlight of this trip, which may have been topped by beer tastings that we did not take.</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">Apart from Brussels, we also visited Ghent, Brugge and Antwerp. These cities were much more lovely and felt safer.</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">We completed the remaining 5 days of our trip in Amsterdam, and spent New Year’s Day here. We have always wanted to see the canals of Amsterdam, and heard a great deal of the bustling culinary scene in the city. We spent most of our days within the city, treading through the streets with our own two feet, sitting in cafes and restaurants people watching. We of course did many tourist activities, such as to see the Van Gogh and Anne Frank museums, try Stroopwafels in the Albert Cuyp Market, and visit the neighboring districts of Zaandam and Utrecht.</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">We thoroughly enjoyed our trip in Europe. On our journey home, we were greeted by an unexpected yet pleasant surprise; our stopover flight to Munich was delayed, and therefore our flight had to be rebooked under KLM. We enjoyed an earlier and direct trip home.</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">We hope that you enjoyed reading about our holiday journey through Europe, and experienced some of our joys through the photos we took. Until the next time!</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">Warm regards,</p><p style=\"caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);\">Martin and Sophie</p>","thumbnail":"data:image/jpeg;base64,/9j/4AAUSkZJRgABAQEBLAEsAABBTVBG/+EdBUV4aWYAAE1NACoAAAAIAAsBDwACAAAABgAAAJIBEAACAAAADgAAAJgBGgAFAAAAAQAAAKYBGwAFAAAAAQAAAK4BKAADAAAAAQACAAABMQACAAAABQAAALYBMgACAAAAFAAAALwBPAACAAAADgAAANACEwADAAAAAQABAACHaQAEAAAAAQAAAN6IJQAEAAAAAQAAA6YAAATcQXBwbGUAaVBob25lIDE2IFBybwAAAABIAAAAAQAAAEgAAAABMjYuMQAAMjAyNToxMjoyMSAxNToxMzo0NgBpUGhvbmUgMTYgUHJvAAAkgpoABQAAAAEAAAKUgp0ABQAAAAEAAAKciCIAAwAAAAEAAgAAiCcAAwAAAAEAZAAAkAAABwAAAAQwMjMykAMAAgAAABQAAAKkkAQAAgAAABQAAAK4kBAAAgAAAAcAAALMkBEAAgAAAAcAAALUkBIAAgAAAAcAAALckQEABwAAAAQBAgMAkgEACgAAAAEAAALkkgIABQAAAAEAAALskgMACgAAAAEAAAL0kgQACgAAAAEAAAL8kgcAAwAAAAEABQAAkgkAAwAAAAEAEAAAkgoABQAAAAEAAAMEkhQAAwAAAAQAAAMMknwABwAAAD   const ABOUT = {"name":"Sophie and Martin, but mostly written by Martin","bio":"Inspired by fellow travellers, both contemporaries and antecedents separated by distance, who bridged this gap in writing through postcards","location":"","email":"","instagram":"","reading":""};

  function formatDate(publishDate, createdAt) {
    if (publishDate) { const [y,m,d] = publishDate.split('-'); return new Date(y,m-1,d).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}); }
    return new Date(createdAt).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  }

  function renderGrid() {
    const posts = [...POSTS].sort((a,b) => {
      const da = a.publishDate ? new Date(a.publishDate) : new Date(a.createdAt);
      const db = b.publishDate ? new Date(b.publishDate) : new Date(b.createdAt);
      return db - da;
    });
    const grid = document.getElementById('post-grid');
    if (!posts.length) { grid.innerHTML = '<div class="empty-state">No posts yet.</div>'; return; }
    grid.innerHTML = posts.map(p => `
      <div class="tile" onclick="openPost('${p.id}')">
        <div class="tile-img">${p.thumbnail ? `<img src="${p.thumbnail}" alt="${p.title||''}">` : '<div class="tile-no-img">No image</div>'}</div>
        <div class="tile-info">
          <p class="tile-date">${formatDate(p.publishDate, p.createdAt)}</p>
          <p class="tile-title">${p.title||'Untitled'}</p>
          ${p.lede ? `<p class="tile-lede">${p.lede.substring(0,72)}${p.lede.length>72?'…':''}</p>` : ''}
        </div>
      </div>
    `).join('');
  }

  function openPost(id) {
    const p = POSTS.find(p => p.id === id);
    if (!p) return;
    document.getElementById('sv-date').textContent = formatDate(p.publishDate, p.createdAt);
    document.getElementById('sv-title').textContent = p.title||'Untitled';
    const thumb = document.getElementById('sv-thumbnail');
    if (p.thumbnail) { thumb.src = p.thumbnail; thumb.style.display = 'block'; } else { thumb.style.display = 'none'; }
    const lede = document.getElementById('sv-lede');
    if (p.lede) { lede.textContent = p.lede; lede.style.display = 'block'; } else { lede.style.display = 'none'; }
    document.getElementById('sv-body').innerHTML = p.body||'';
    showView('post');
    window.scrollTo(0,0);
  }

  function renderAbout() {
    const a = ABOUT;
    const nameEl = document.getElementById('about-name');
    if (a.name) { const parts = a.name.split('.'); nameEl.innerHTML = parts.length>1 ? parts[0].trim()+'.<br>'+parts.slice(1).join('.').trim() : a.name; }
    const bodyEl = document.getElementById('about-body');
    const paras = a.bio ? a.bio.split(/\n\n+/).map(p => `<p>${p.trim().replace(/\n/g,'<br>')}</p>`).join('') : '';
    const rows = [];
    if (a.location) rows.push(`<span class="lbl">Location</span><span>${a.location}</span>`);
    if (a.email) rows.push(`<span class="lbl">Email</span><span><a href="mailto:${a.email}">${a.email}</a></span>`);
    if (a.instagram) { const h = a.instagram.startsWith('@') ? a.instagram : '@'+a.instagram; rows.push(`<span class="lbl">Instagram</span><span><a href="https://instagram.com/${h.replace('@','')}" target="_blank">${h}</a></span>`); }
    if (a.reading) rows.push(`<span class="lbl">Reading</span><span>${a.reading}</span>`);
    bodyEl.innerHTML = paras + (rows.length ? '<hr class="divider"><div class="about-meta">'+rows.join('')+'</div>' : '');
  }

  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const el = document.getElementById('view-'+id);
    if (el) { el.classList.add('active'); el.style.animation='none'; requestAnimationFrame(()=>{el.style.animation='';}); }
    if (id==='grid') renderGrid();
    if (id==='about') renderAbout();
    document.querySelectorAll('.nav-links a').forEach(a => { a.classList.toggle('active', a.dataset.view===id); });
    return false;
  }

  window.addEventListener('scroll', () => { document.getElementById('nav').classList.toggle('scrolled', window.scrollY>10); });
  renderGrid();
</script>
